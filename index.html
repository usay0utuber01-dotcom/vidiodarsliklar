<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VD AKADEMIYA | Professional Ta'lim Platformasi</title>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.1/firebase-database-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar" id="main-nav" style="display: none;">
        <div class="nav-container">
            <div class="logo">VD<span>AKADEMIYA</span></div>
            <div class="nav-user-info" id="nav-user-info"></div>
            <button class="logout-btn" onclick="app.logout()">Chiqish</button>
        </div>
    </nav>

    <!-- Background Animations & Thematic Elements -->
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        
        <!-- Thematic Floating Icons -->
        <div class="float-icon icon-video">🎥</div>
        <div class="float-icon icon-mic">🎙️</div>
        <div class="float-icon icon-book">📚</div>
        <div class="float-icon icon-gear">⚙️</div>
        <div class="float-icon icon-play">▶️</div>
    </div>

    <!-- Live Record Indicator -->
    <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span class="rec-text">REC LIVE</span>
    </div>

    <div class="container">
        
        <!-- LANDING -->
        <section id="page-landing" class="page active">
            <div class="landing-container">
                <div class="landing-content">
                    <h1>VD<span>AKADEMIYA</span></h1>
                    <div class="main-buttons">
                        <button class="btn btn-primary btn-lg" onclick="app.showPage('page-student-login')">KIRISH_</button>
                        <button class="btn btn-outline btn-lg" onclick="app.showPage('page-register')">RO'YXATDAN O'TISH</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- REGISTER -->
        <section id="page-register" class="page">
            <div class="auth-card">
                <button class="back-btn" onclick="app.showPage('page-landing')">← Orqaga</button>
                <h2>Ro'yxatdan o'tish</h2>
                <div class="input-group"><label>Ism</label><input type="text" id="reg-firstname"></div>
                <div class="input-group"><label>Familiya</label><input type="text" id="reg-lastname"></div>
                <button class="btn btn-primary w-100" onclick="app.register()">DAVOM ETISH_</button>
            </div>
        </section>

        <!-- STUDENT LOGIN -->
        <section id="page-student-login" class="page">
            <div class="auth-card">
                <button class="back-btn" onclick="app.showPage('page-landing')">← Orqaga</button>
                <h2>O'quvchi kirishi</h2>
                <div class="input-group"><label>Login</label><input type="text" id="login-username"></div>
                <button class="btn btn-primary w-100" onclick="app.studentLogin()">KIRISH_</button>
            </div>
        </section>

        <!-- DASHBOARDS -->
        <section id="page-student-dashboard" class="page">
            <div class="dashboard-header" style="text-align: center; margin-bottom: 2rem;">
                <h1 id="welcome-greeting" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Xush kelibsiz!</h1>
                <p style="color: var(--text-dim); font-size: 1.1rem;">Bilim olishda davom eting.</p>
            </div>
            <div id="video-grid" class="video-grid"></div>
        </section>

        <!-- 6. LESSON VIEW -->
        <section id="page-lesson-view" class="page">
            <div style="max-width: 1200px; margin: 0 auto;">
                <button class="back-btn" onclick="app.showPage('page-student-dashboard')">← ORQAGA QAYTISH</button>
                <div class="video-wrapper"><iframe id="lesson-iframe" src="" frameborder="0" allowfullscreen></iframe></div>
                <h2 id="lesson-title" class="lesson-title-large"></h2>
                <div style="text-align: center;">
                    <button class="btn btn-primary btn-lg" onclick="app.startLessonTest()">IMTIHONNI BOSHLASH ⚡</button>
                </div>
            </div>
            
            <div id="lesson-test-overlay" class="test-overlay" style="display: none;">
                <div class="test-card">
                    <button class="btn btn-link" onclick="app.closeLessonTest()" style="color:#fff; float:right; font-size: 2rem; border: none; background: none; cursor: pointer;">×</button>
                    <h3 style="font-size: 2rem; margin-bottom: 2rem;">Dars imtihoni</h3>
                    <div id="lesson-questions-container"></div>
                    <button class="btn btn-primary w-100 btn-lg" onclick="app.submitLessonTest()" style="margin-top: 2rem;">NATIJALARNI TASDIQLASH_</button>
                </div>
            </div>
        </section>

        <!-- 7. STUDENT COMP -->
        <section id="page-student-comp" class="page">
            <div class="comp-exam-header" style="text-align: center; margin-bottom: 2rem;">
                <div id="comp-timer" class="timer-big">15:00</div>
            </div>
            <div id="comp-questions-container" class="questions-list"></div>
            <button class="btn btn-primary w-100" onclick="app.submitCompTest()" style="margin-top: 2rem;">YUBORISH_</button>
        </section>

        <!-- 8. CERTIFICATE -->
        <section id="page-final-results" class="page">
            <div class="final-card">
                <div id="certificate-template" class="certificate">
                    <div class="cert-body">
                        <h1>SERTIFIKAT</h1>
                        <h2 id="cert-name">FOYDALANUVCHI</h2>
                        <p>Kursni muvaffaqiyatli yakunlagani uchun</p>
                        <div id="cert-date"></div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="app.downloadCertificate()">YUKLAB OLISH</button>
            </div>
        </section>

    </div>

    <script src="assets/js/main.js" type="module"></script>
</body>
</html>
